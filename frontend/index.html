<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>sharele-共享世界</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./amap-config.js"></script>
    <script>
      window.__SHARELE_CONFIG__ = Object.assign({
        envName: 'local',
        apiBase: '',
        amapKey: '',
        amapSecurityJsCode: ''
      }, window.__SHARELE_CONFIG__ || {})
      window._AMapSecurityConfig = {
        securityJsCode: window.__SHARELE_CONFIG__.amapSecurityJsCode
      }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=61131aea053ef9adb2cad398e64f9608"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      ;(() => {
        const configuredKey = window.__SHARELE_CONFIG__?.amapKey || window.SHARELE_AMAP_KEY || '61131aea053ef9adb2cad398e64f9608'
        const script = document.querySelector('script[src*="webapi.amap.com/maps"]')
        if (script && configuredKey && !script.src.includes(`key=${configuredKey}`)) {
          script.src = `https://webapi.amap.com/maps?v=2.0&key=${configuredKey}`
        }
      })()
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
